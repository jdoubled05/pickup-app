appId: com.simbasghost.pickupnativewindclean
tags:
  - share
---
# Share a court via native share sheet, then dismiss

- launchApp
- waitForAnimationToEnd
- waitForAnimationToEnd
- openLink: "exp+pickup-nativewind-clean://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Search courts..."
    timeout: 30000
- tapOn:
    id: "courts-tab"
- waitForAnimationToEnd

# Clear any persisted filters
- tapOn:
    id: "filter-button"
- extendedWaitUntil:
    visible: "COURT TYPE"
    timeout: 8000
- runFlow:
    when:
      visible: "Clear all filters"
    commands:
      - tapOn: "Clear all filters"
      - waitForAnimationToEnd
- tapOn: "Close filters"
- waitForAnimationToEnd

# Tap first court card
- tapOn:
    id: "court-card"
- waitForAnimationToEnd
- assertVisible: "Check in at this court"

# Tap share button — native share sheet should appear
- tapOn:
    id: "share-button"
- extendedWaitUntil:
    visible: "Copy"
    timeout: 5000

# Dismiss share sheet by swiping down
- swipe:
    direction: DOWN
    duration: 400
- waitForAnimationToEnd

# Still on court detail
- assertVisible: "Check in at this court"
