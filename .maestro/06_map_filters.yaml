appId: com.simbasghost.pickupnativewindclean
tags:
  - map
  - filters
---
# Map filters: apply filter from map, verify indicator, reset

- launchApp
- waitForAnimationToEnd
- waitForAnimationToEnd
- openLink: "exp+pickup-nativewind-clean://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"
- extendedWaitUntil:
    visible:
      text: "Search courts..."
    timeout: 30000
- waitForAnimationToEnd
- tapOn:
    id: "map-tab"
- extendedWaitUntil:
    visible:
      text: "Search courts or a location..."
    timeout: 15000

# Open filter modal from map
- tapOn:
    id: "filter-button"
- waitForAnimationToEnd
- assertVisible: "COURT TYPE"

# Toggle Has Lighting
- tapOn: "Filter for courts with lighting"
- waitForAnimationToEnd

# Apply
- tapOn: "Apply filters"
- waitForAnimationToEnd

# Modal closed, back on map
- assertVisible: "Search courts or a location..."

# Re-open and reset
- tapOn:
    id: "filter-button"
- waitForAnimationToEnd
- tapOn: "Clear all filters"
- waitForAnimationToEnd

# No active filters — button label is "Close filters"
- tapOn: "Close filters"
- waitForAnimationToEnd
