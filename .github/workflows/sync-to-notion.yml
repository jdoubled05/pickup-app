name: Sync checklist to Notion

on:
  push:
    branches: [main]
    paths:
      - MVP_Launch_Plan.md

# Skip if this commit was made by the sync bot itself
concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Notion SDK
        run: npm install --no-save @notionhq/client

      - name: Push checklist to Notion
        run: node scripts/notion-sync.mjs push
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Commit notion IDs back to markdown
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MVP_Launch_Plan.md
          git diff --staged --quiet || (git commit -m "chore: add notion IDs to checklist [skip ci]" && git push)
